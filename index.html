<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocalize AI - Gerador TTS Moderno (Gemini)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        /* Animação do Visualizador de Áudio (Ondas) */
        .visualizer-bar {
            width: 6px;
            height: 10px;
            background-color: #3b82f6;
            border-radius: 3px;
            margin: 0 2px;
            transition: height 0.1s ease;
            opacity: 0.3;
        }
        
        .playing .visualizer-bar {
            opacity: 1;
            animation: bounce 1s infinite alternate ease-in-out;
        }
        .paused .visualizer-bar {
            opacity: 0.5;
            animation: none;
            height: 15px !important;
        }

        .playing .visualizer-bar:nth-child(1) { animation-delay: 0.0s; }
        .playing .visualizer-bar:nth-child(2) { animation-delay: 0.2s; }
        .playing .visualizer-bar:nth-child(3) { animation-delay: 0.4s; }
        .playing .visualizer-bar:nth-child(4) { animation-delay: 0.1s; }
        .playing .visualizer-bar:nth-child(5) { animation-delay: 0.3s; }
        .playing .visualizer-bar:nth-child(6) { animation-delay: 0.5s; }

        @keyframes bounce {
            0% { height: 10px; }
            100% { height: 40px; background-color: #60a5fa; box-shadow: 0 0 8px #3b82f6;}
        }

        textarea:focus, input:focus, select:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5);
            border-color: #3b82f6;
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-8">

    <div class="w-full max-w-6xl bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 overflow-hidden flex flex-col lg:flex-row">
        
        <!-- Área Esquerda: Entrada de Texto e Controle -->
        <div class="w-full lg:w-3/5 p-6 sm:p-8 flex flex-col">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white shadow-lg">
                        <i class="ph ph-sparkle text-2xl"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold text-white tracking-tight">Vocalize AI</h1>
                        <p class="text-sm text-blue-300">Vozes Neurais do Google Gemini</p>
                    </div>
                </div>
                <div id="queue-status" class="hidden items-center gap-2 text-xs font-medium bg-indigo-500/20 text-indigo-300 px-3 py-1.5 rounded-full border border-indigo-500/30">
                    <div class="loader w-3 h-3 border-2"></div>
                    <span id="queue-text">Gerando áudio...</span>
                </div>
            </div>

            <!-- Caixa de Texto -->
            <div class="relative flex-grow flex flex-col gap-4">
                
                <div class="flex flex-col gap-1">
                    <label class="text-sm font-medium text-slate-400">Direção de Estilo (Opcional)</label>
                    <input type="text" id="style-input" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-slate-200 transition-all text-sm" placeholder="Ex: Leia de forma dramática / Sussurre / Leia rindo...">
                </div>

                <div class="relative flex-grow flex flex-col">
                    <textarea id="text-input" class="w-full flex-grow bg-slate-900 border border-slate-700 rounded-xl p-4 text-slate-200 resize-none min-h-[250px] text-lg leading-relaxed transition-all" placeholder="Digite ou cole seu texto aqui... Sem limites de tamanho. Textos longos serão divididos e tocados sequencialmente."></textarea>
                    
                    <div class="absolute bottom-4 right-4 flex items-center gap-2 text-xs text-slate-500 font-medium bg-slate-900/80 px-2 py-1 rounded">
                        <span id="char-count">0</span> caracteres
                    </div>
                </div>
            </div>

            <div class="mt-6 flex flex-col sm:flex-row items-center justify-between gap-6 bg-slate-900/50 p-4 rounded-xl border border-slate-700/50">
                
                <!-- Visualizador de Áudio Falso -->
                <div id="visualizer" class="flex items-end h-12 w-32 justify-center">
                    <div class="visualizer-bar"></div>
                    <div class="visualizer-bar"></div>
                    <div class="visualizer-bar"></div>
                    <div class="visualizer-bar"></div>
                    <div class="visualizer-bar"></div>
                    <div class="visualizer-bar"></div>
                </div>

                <!-- Botões de Controle de Reprodução -->
                <div class="flex items-center gap-3">
                    <button id="btn-stop" class="w-12 h-12 flex items-center justify-center rounded-full bg-slate-700 hover:bg-red-500 hover:text-white text-slate-300 transition-all disabled:opacity-50 disabled:cursor-not-allowed" disabled title="Parar tudo">
                        <i class="ph-fill ph-stop text-xl"></i>
                    </button>
                    <button id="btn-pause" class="w-12 h-12 flex items-center justify-center rounded-full bg-slate-700 hover:bg-slate-600 text-slate-300 transition-all disabled:opacity-50 disabled:cursor-not-allowed" disabled title="Pausar/Retomar">
                        <i class="ph-fill ph-pause text-xl"></i>
                    </button>
                    <button id="btn-play" class="flex items-center gap-2 px-8 h-12 rounded-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-medium shadow-lg shadow-blue-500/30 transition-all hover:scale-105">
                        <i class="ph-fill ph-play text-xl"></i>
                        <span>Gerar & Ouvir</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="w-full lg:w-2/5 bg-slate-800/80 p-6 sm:p-8 border-t lg:border-t-0 lg:border-l border-slate-700 flex flex-col gap-6">
            
            <h2 class="text-lg font-semibold text-slate-200 mb-2 flex items-center gap-2">
                <i class="ph ph-microphone-stage text-indigo-400"></i>
                Seleção de Voz (AI)
            </h2>

            <!-- Filtro de Categoria -->
            <div>
                <label class="block text-sm font-medium text-slate-400 mb-2">Categoria de Voz</label>
                <div class="grid grid-cols-2 gap-2">
                    <button class="category-btn active bg-blue-600 text-white py-2 rounded-lg text-sm transition-colors border border-blue-500" data-cat="all">Todas</button>
                    <button class="category-btn bg-slate-700 hover:bg-slate-600 text-slate-300 py-2 rounded-lg text-sm transition-colors border border-slate-600" data-cat="female">Femininas</button>
                    <button class="category-btn bg-slate-700 hover:bg-slate-600 text-slate-300 py-2 rounded-lg text-sm transition-colors border border-slate-600" data-cat="male">Masculinas</button>
                    <button class="category-btn bg-slate-700 hover:bg-slate-600 text-slate-300 py-2 rounded-lg text-sm transition-colors border border-slate-600" data-cat="child">Jovens/Infantis</button>
                </div>
            </div>

            <!-- Seleção de Voz -->
            <div class="flex-grow flex flex-col">
                <label class="block text-sm font-medium text-slate-400 mb-2 flex justify-between">
                    <span>Voz Disponível</span>
                    <span id="voice-count" class="text-xs bg-slate-700 px-2 py-0.5 rounded-full text-slate-300">Carregando...</span>
                </label>
                
                <div class="bg-slate-900 border border-slate-700 rounded-lg overflow-hidden flex-grow min-h-[200px] flex flex-col">
                    <div id="voice-list-container" class="flex-grow overflow-y-auto p-2 flex flex-col gap-1">
                        <!-- Itens renderizados via JS -->
                    </div>
                </div>
            </div>

            <!-- Dicas -->
            <div class="bg-indigo-500/10 border border-indigo-500/20 rounded-lg p-4 text-sm text-indigo-300">
                <i class="ph-fill ph-info block mb-1 text-lg"></i>
                A IA do Gemini detecta o idioma automaticamente. Experimente usar a "Direção de Estilo" para alterar o tom emocional da leitura!
            </div>

            <!-- Mensagem de Status -->
            <div id="status-message" class="hidden rounded-lg p-3 text-sm transition-all"></div>
        </div>
    </div>

    <script>
        // --- Dados das Vozes do Gemini ---
        // Classificação baseada nas descrições oficias da API
        const geminiVoices = [
            { name: "Kore", label: "Kore (Firme)", category: "female" },
            { name: "Aoede", label: "Aoede (Suave)", category: "female" },
            { name: "Callirrhoe", label: "Callirrhoe (Tranquila)", category: "female" },
            { name: "Autonoe", label: "Autonoe (Brilhante)", category: "female" },
            { name: "Despina", label: "Despina (Macio)", category: "female" },
            { name: "Laomedeia", label: "Laomedeia (Animada)", category: "female" },
            { name: "Pulcherrima", label: "Pulcherrima (Direta)", category: "female" },
            { name: "Vindemiatrix", label: "Vindemiatrix (Gentil)", category: "female" },
            
            { name: "Charon", label: "Charon (Informativo)", category: "male" },
            { name: "Orus", label: "Orus (Firme)", category: "male" },
            { name: "Zephyr", label: "Zephyr (Brilhante)", category: "male" },
            { name: "Iapetus", label: "Iapetus (Claro)", category: "male" },
            { name: "Algieba", label: "Algieba (Suave)", category: "male" },
            { name: "Algenib", label: "Algenib (Grave/Áspero)", category: "male" },
            { name: "Rasalgethi", label: "Rasalgethi (Informativo)", category: "male" },
            { name: "Achernar", label: "Achernar (Suave)", category: "male" },
            { name: "Alnilam", label: "Alnilam (Firme)", category: "male" },
            { name: "Gacrux", label: "Gacrux (Maduro)", category: "male" },
            { name: "Fenrir", label: "Fenrir (Empolgado)", category: "male" },
            
            { name: "Leda", label: "Leda (Jovem)", category: "child" },
            { name: "Puck", label: "Puck (Brincalhão/Jovem)", category: "child" }
        ];

        let selectedVoice = "Kore"; // Default
        let currentFilter = "all";
        
        // Elementos UI
        const textInput = document.getElementById('text-input');
        const styleInput = document.getElementById('style-input');
        const charCount = document.getElementById('char-count');
        const voiceListContainer = document.getElementById('voice-list-container');
        const voiceCount = document.getElementById('voice-count');
        const categoryBtns = document.querySelectorAll('.category-btn');
        
        const btnPlay = document.getElementById('btn-play');
        const btnPause = document.getElementById('btn-pause');
        const btnStop = document.getElementById('btn-stop');
        const visualizer = document.getElementById('visualizer');
        const statusMessage = document.getElementById('status-message');
        const queueStatus = document.getElementById('queue-status');
        const queueText = document.getElementById('queue-text');

        // Atualizar contador de caracteres
        textInput.addEventListener('input', () => {
            charCount.textContent = textInput.value.length;
        });

        // --- Renderização da Lista de Vozes ---
        function renderVoices() {
            voiceListContainer.innerHTML = '';
            const filtered = currentFilter === 'all' 
                ? geminiVoices 
                : geminiVoices.filter(v => v.category === currentFilter);
            
            voiceCount.textContent = `${filtered.length} vozes`;

            filtered.forEach(voice => {
                const btn = document.createElement('button');
                const isSelected = voice.name === selectedVoice;
                
                btn.className = `flex items-center gap-3 w-full text-left p-3 rounded-md transition-all border ${isSelected ? 'bg-blue-600/20 border-blue-500' : 'bg-transparent border-transparent hover:bg-slate-800'}`;
                
                // Icone dependendo da categoria
                let iconClass = "ph-user";
                if (voice.category === 'female') iconClass = "ph-user-list"; // Representação simples
                if (voice.category === 'child') iconClass = "ph-baby";

                btn.innerHTML = `
                    <div class="w-8 h-8 rounded-full ${isSelected ? 'bg-blue-500 text-white' : 'bg-slate-700 text-slate-300'} flex items-center justify-center shrink-0">
                        <i class="ph ${iconClass}"></i>
                    </div>
                    <div class="flex-grow">
                        <div class="text-sm font-medium ${isSelected ? 'text-blue-400' : 'text-slate-200'}">${voice.label}</div>
                        <div class="text-xs text-slate-500 capitalize">${voice.category === 'female' ? 'Feminina' : (voice.category === 'male' ? 'Masculina' : 'Infantil/Jovem')}</div>
                    </div>
                    ${isSelected ? '<i class="ph-fill ph-check-circle text-blue-500 text-lg"></i>' : ''}
                `;

                btn.onclick = () => {
                    selectedVoice = voice.name;
                    renderVoices(); // Re-render to update selection style
                };

                voiceListContainer.appendChild(btn);
            });
        }

        // Filtros de Categoria
        categoryBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                categoryBtns.forEach(b => {
                    b.classList.remove('bg-blue-600', 'text-white', 'border-blue-500');
                    b.classList.add('bg-slate-700', 'text-slate-300', 'border-slate-600');
                });
                
                const target = e.target;
                target.classList.remove('bg-slate-700', 'text-slate-300', 'border-slate-600');
                target.classList.add('bg-blue-600', 'text-white', 'border-blue-500');
                
                currentFilter = target.getAttribute('data-cat');
                renderVoices();
            });
        });

        renderVoices();

        function base64ToArrayBuffer(base64) {
            const binaryString = window.atob(base64);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes.buffer;
        }

        function pcmToWav(pcmData, sampleRate) {
            const numChannels = 1;
            const bitsPerSample = 16;
            const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
            const blockAlign = numChannels * (bitsPerSample / 8);
            const dataSize = pcmData.byteLength;
            const chunkSize = 36 + dataSize;
            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);

            const writeString = (view, offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };

            writeString(view, 0, 'RIFF');
            view.setUint32(4, chunkSize, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); // PCM
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitsPerSample, true);
            writeString(view, 36, 'data');
            view.setUint32(40, dataSize, true);

            const pcmView = new Int16Array(pcmData);
            for (let i = 0; i < pcmView.length; i++) {
                view.setInt16(44 + i * 2, pcmView[i], true);
            }

            return new Blob([buffer], { type: 'audio/wav' });
        }

        function showMessage(msg, type = 'info') {
            statusMessage.textContent = msg;
            statusMessage.classList.remove('hidden', 'bg-blue-500/10', 'text-blue-400', 'border-blue-500/20', 'bg-red-500/10', 'text-red-400', 'border-red-500/20');
            
            if (type === 'error') {
                statusMessage.classList.add('bg-red-500/10', 'border', 'border-red-500/20', 'text-red-400');
            } else {
                statusMessage.classList.add('bg-blue-500/10', 'border', 'border-blue-500/20', 'text-blue-400');
            }
            setTimeout(() => statusMessage.classList.add('hidden'), 5000);
        }

        // Chunking para dividir textos muito grandes (evita timeouts e limites da API)
        function chunkText(text, maxLength = 800) {
            let chunks = [];
            let paragraphs = text.split(/\n\s*\n/);
            
            for (let p of paragraphs) {
                if (!p.trim()) continue;
                if (p.length <= maxLength) {
                    chunks.push(p.trim());
                } else {
                    let sentences = p.match(/[^.!?]+[.!?]+/g) || [p];
                    let currentChunk = "";
                    for (let s of sentences) {
                        if ((currentChunk + s).length > maxLength) {
                            if (currentChunk) chunks.push(currentChunk.trim());
                            currentChunk = s;
                        } else {
                            currentChunk += (currentChunk ? " " : "") + s;
                        }
                    }
                    if (currentChunk.trim()) chunks.push(currentChunk.trim());
                }
            }
            return chunks;
        }

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        // Chamada à API com Exponential Backoff
        async function fetchGeminiTTS(textToSay, voiceName, styleInstruction) {
            const fullPrompt = styleInstruction ? `Instrução de estilo: ${styleInstruction}. Texto: ${textToSay}` : textToSay;
            
            const payload = {
                contents: [{ parts: [{ text: fullPrompt }] }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: {
                        voiceConfig: {
                            prebuiltVoiceConfig: { voiceName: voiceName }
                        }
                    }
                },
                model: "gemini-2.5-flash-preview-tts"
            };

            const apiKey = ""; // Será injetado pelo ambiente Canvas
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;

            let retries = 3;
            let delay = 1000;

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        if (response.status === 429) throw new Error("Throttled");
                        throw new Error(`API Error: ${response.status}`);
                    }

                    const result = await response.json();
                    const part = result?.candidates?.[0]?.content?.parts?.[0];
                    if (!part?.inlineData) throw new Error("No audio data returned");

                    const audioData = part.inlineData.data;
                    const mimeType = part.inlineData.mimeType;
                    
                    let sampleRate = 24000;
                    const match = mimeType.match(/rate=(\d+)/);
                    if (match) sampleRate = parseInt(match[1], 10);

                    const pcmData = base64ToArrayBuffer(audioData);
                    const pcm16 = new Int16Array(pcmData);
                    const wavBlob = pcmToWav(pcm16, sampleRate);
                    return URL.createObjectURL(wavBlob);

                } catch (error) {
                    if (error.message === "Throttled" && i < retries - 1) {
                        await sleep(delay);
                        delay *= 2; // Exponential backoff
                    } else {
                        throw error;
                    }
                }
            }
        }

        let audioQueue = [];
        let isPlaying = false;
        let isGenerating = false;
        let currentAudioObject = null;
        let stopRequested = false;

        function updatePlayerUI() {
            if (isPlaying) {
                visualizer.classList.add('playing');
                visualizer.classList.remove('paused');
                btnPlay.disabled = true;
                btnPlay.innerHTML = `<i class="ph-fill ph-speaker-high text-xl"></i><span>Tocando...</span>`;
                btnPlay.classList.add('opacity-50', 'cursor-not-allowed');
                btnStop.disabled = false;
                btnPause.disabled = false;
                btnPause.innerHTML = '<i class="ph-fill ph-pause text-xl"></i>';
            } else if (currentAudioObject && currentAudioObject.paused && !currentAudioObject.ended) {
                // Pausado
                visualizer.classList.remove('playing');
                visualizer.classList.add('paused');
                btnPause.innerHTML = '<i class="ph-fill ph-play text-xl"></i>';
            } else {
                // Parado
                visualizer.classList.remove('playing', 'paused');
                btnPlay.disabled = false;
                btnPlay.innerHTML = `<i class="ph-fill ph-play text-xl"></i><span>Gerar & Ouvir</span>`;
                btnPlay.classList.remove('opacity-50', 'cursor-not-allowed');
                btnStop.disabled = true;
                btnPause.disabled = true;
                
                if(!isGenerating) {
                    queueStatus.classList.add('hidden');
                }
            }
        }

        async function processQueue() {
            if (isPlaying || audioQueue.length === 0 || stopRequested) return;

            isPlaying = true;
            updatePlayerUI();

            const nextAudioUrl = audioQueue.shift();
            currentAudioObject = new Audio(nextAudioUrl);
            
            currentAudioObject.onended = () => {
                isPlaying = false;
                URL.revokeObjectURL(nextAudioUrl); // Limpar memória
                
                // Toca o próximo se houver, ou atualiza UI
                if (audioQueue.length > 0) {
                    processQueue();
                } else if (!isGenerating) {
                    updatePlayerUI();
                }
            };

            currentAudioObject.onerror = () => {
                console.error("Erro ao reproduzir áudio");
                isPlaying = false;
                processQueue();
            };

            try {
                await currentAudioObject.play();
            } catch (e) {
                console.error("Autoplay prevent", e);
                isPlaying = false;
                updatePlayerUI();
            }
        }

        async function startGenerationAndPlayback() {
            const text = textInput.value.trim();
            if (!text) {
                showMessage("Por favor, digite algum texto para gerar áudio.", "error");
                return;
            }

            // Reset state
            stopEverything();
            stopRequested = false;
            
            const chunks = chunkText(text);
            const style = styleInput.value.trim();
            const voice = selectedVoice;

            isGenerating = true;
            queueStatus.classList.remove('hidden');
            queueStatus.classList.replace('text-indigo-300', 'text-blue-300');
            queueStatus.classList.replace('bg-indigo-500/20', 'bg-blue-500/20');
            
            btnPlay.disabled = true;
            btnPlay.innerHTML = `<div class="loader w-5 h-5 border-2"></div><span>Conectando IA...</span>`;
            
            let successCount = 0;

            for (let i = 0; i < chunks.length; i++) {
                if (stopRequested) break;
                
                queueText.textContent = `Processando parte ${i + 1} de ${chunks.length}...`;
                
                try {
                    const audioUrl = await fetchGeminiTTS(chunks[i], voice, style);
                    if (stopRequested) {
                        URL.revokeObjectURL(audioUrl);
                        break;
                    }
                    
                    audioQueue.push(audioUrl);
                    successCount++;
                    
                    // Começa a tocar assim que a primeira parte chega!
                    if (!isPlaying) {
                        processQueue();
                    }
                } catch (error) {
                    console.error("Erro no chunk", i, error);
                    showMessage(`Erro ao gerar a parte ${i + 1}. Tentando continuar...`, "error");
                }
            }

            isGenerating = false;
            
            if (successCount === 0 && !stopRequested) {
                showMessage("Falha ao gerar o áudio. Tente novamente.", "error");
                stopEverything();
            } else if (!stopRequested) {
                queueStatus.classList.replace('text-blue-300', 'text-emerald-400');
                queueStatus.classList.replace('bg-blue-500/20', 'bg-emerald-500/20');
                queueText.textContent = "Geração concluída!";
                setTimeout(() => {
                    if (!isGenerating) queueStatus.classList.add('hidden');
                }, 3000);
            }
        }

        function togglePause() {
            if (currentAudioObject) {
                if (currentAudioObject.paused) {
                    currentAudioObject.play();
                    isPlaying = true;
                } else {
                    currentAudioObject.pause();
                    isPlaying = false;
                }
                updatePlayerUI();
            }
        }

        function stopEverything() {
            stopRequested = true;
            isGenerating = false;
            isPlaying = false;
            
            if (currentAudioObject) {
                currentAudioObject.pause();
                currentAudioObject = null;
            }
            
            // Limpa URLs
            audioQueue.forEach(url => URL.revokeObjectURL(url));
            audioQueue = [];
            
            queueStatus.classList.add('hidden');
            updatePlayerUI();
        }

        // Listeners
        btnPlay.addEventListener('click', startGenerationAndPlayback);
        btnPause.addEventListener('click', togglePause);
        btnStop.addEventListener('click', stopEverything);

    </script>
</body>
</html>
